<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<div class="card p-4 shadow" style="width: 350px;">
    <h3 class="text-center mb-3">Register</h3>

    <input type="text" class="form-control mb-2" placeholder="Name">
    <input type="email" class="form-control mb-2" placeholder="Email">
    <input type="tel" class="form-control mb-2" placeholder="Phone Number">
    <input type="password" class="form-control mb-2" placeholder="Password">
    <input type="password" class="form-control mb-3" placeholder="Confirm Password">

    <a href="login.html" class="btn btn-success w-100">Register</a>

    <div class="text-center mt-3">
        <a href="login.html">I already have an account</a>
    </div>
</div>

</body>
</html>
